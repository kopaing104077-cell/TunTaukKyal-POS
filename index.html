<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ထွန်းတောက်ကြွယ် POS - v59 (Fixed Layout)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --midnight: #020617; --primary: #1e293b; --green: #10b981; --red: #ef4444; --gold: #fbbf24; --bg: #f3f4f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', 'Pyidaungsu', sans-serif; }
        
        /* Body Layout Fixes */
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { background: var(--midnight); color: white; height: 60px; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 1000; }
        .db-status { font-size: 11px; display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 20px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #666; }
        .dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }

        .nav { background: white; height: 70px; display: flex; border-top: 2px solid var(--midnight); flex-shrink: 0; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; color: #94a3b8; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--midnight); font-weight: bold; }
        .nav-item i { font-size: 1.3rem; margin-bottom: 4px; }

        /* Container & Tabs */
        .container { flex: 1; overflow: hidden; display: none; padding: 10px; max-width: 900px; margin: auto; width: 100%; }
        .container.active { display: flex; flex-direction: column; }
        
        .card { background: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
        .input-style { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; margin-bottom: 8px; outline: none; }

        /* Special Layout for Sales Tab */
        #sales-top-fixed { flex-shrink: 0; }
        #pos-grid-container { flex: 1; overflow-y: auto; padding-bottom: 10px; -webkit-overflow-scrolling: touch; }
        #sales-bottom-fixed { flex-shrink: 0; background: white; padding: 10px; border-top: 3px solid var(--midnight); border-radius: 15px 15px 0 0; box-shadow: 0 -5px 10px rgba(0,0,0,0.05); }

        /* Categories */
        .cat-scroll { display: flex; overflow-x: auto; gap: 6px; padding-bottom: 5px; scrollbar-width: none; }
        .cat-scroll::-webkit-scrollbar { display: none; }
        .cat-btn { white-space: nowrap; padding: 8px 14px; border-radius: 20px; border: 1px solid #cbd5e1; background: white; font-size: 12px; }
        .cat-btn.active { background: var(--midnight); color: white; border-color: var(--midnight); }

        /* Grid & Cards */
        #pos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .p-card { background: white; border-radius: 10px; border: 1px solid #e2e8f0; text-align: center; overflow: hidden; position: relative; }
        .p-card img { width: 100%; height: 90px; object-fit: cover; background: #eee; }
        .stock-tag { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white; font-size: 9px; padding: 2px 5px; border-radius: 4px; }

        /* Cart List */
        #cart-list { max-height: 100px; overflow-y: auto; margin-bottom: 8px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 8px; border-radius: 8px; margin-bottom: 5px; font-size: 12px; }

        /* Stock & Report Tables */
        .table-area { flex: 1; overflow-y: auto; background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th { background: #f8fafc; padding: 12px; text-align: left; position: sticky; top: 0; border-bottom: 2px solid #e2e8f0; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2001; align-items: center; justify-content: center; padding: 15px; }
        .modal-card { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; }
        
        .btn { border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .btn-green { background: var(--green); color: white; }
        .btn-dark { background: var(--midnight); color: white; }
        .btn-red { background: var(--red); color: white; }

        /* Receipt Rendering */
        #receipt-render-area { position: absolute; left: -9999px; width: 380px; padding: 20px; color: #000; }
        #print-preview-img { width: 100%; border: 1px solid #ddd; margin-bottom: 10px; display: block; }
        .r-line { border-top: 1px dashed #000; margin: 8px 0; }

        @media print {
            body { background: white !important; overflow: visible !important; }
            .header, .nav, .container, .overlay, .btn { display: none !important; }
            #receipt-overlay { display: block !important; position: absolute !important; inset: 0 !important; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div style="font-weight:bold;"><i class="fas fa-star" style="color:var(--gold)"></i> ထွန်းတောက်ကြွယ်</div>
        <div style="display:flex; align-items:center; gap:10px;">
            <button id="logout-btn" onclick="logout()" style="display:none; background:var(--red); color:white; border:none; padding:4px 8px; border-radius:5px; font-size:10px;">ထွက်ရန်</button>
            <div class="db-status">
                <div id="status-dot" class="dot"></div>
                <span id="status-text">Connecting...</span>
            </div>
        </div>
    </header>

    <div id="receipt-render-area"></div>

    <main id="tab-sales" class="container active">
        <div id="sales-top-fixed">
            <div class="card">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                    <input type="text" id="cust-name" class="input-style" placeholder="ဝယ်သူအမည်">
                    <input type="text" id="staff-name" class="input-style" placeholder="အရောင်းသမား">
                </div>
                <input type="text" id="search-box" class="input-style" placeholder="ပစ္စည်းအမည်ဖြင့် ရှာရန်..." onkeyup="refreshUI()">
                <div class="cat-scroll">
                    <button class="cat-btn active" onclick="setCategory('all', this)">အားလုံး</button>
                    <button class="cat-btn" onclick="setCategory('အအေး', this)">အအေး</button>
                    <button class="cat-btn" onclick="setCategory('ကော်ဖီ', this)">ကော်ဖီ</button>
                    <button class="cat-btn" onclick="setCategory('ခေါက်ဆွဲ', this)">ခေါက်ဆွဲ</button>
                    <button class="cat-btn" onclick="setCategory('လူသုံးကုန်', this)">လူသုံးကုန်</button>
                    <button class="cat-btn" onclick="setCategory('မီးဖိုချောင်သုံး', this)">မီးဖိုချောင်သုံး</button>
                    <button class="cat-btn" onclick="setCategory('အခြား', this)">အခြား</button>
                </div>
            </div>
        </div>

        <div id="pos-grid-container">
            <div id="pos-grid"></div>
        </div>

        <div id="sales-bottom-fixed">
            <div id="cart-list"></div>
            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.1rem; padding: 5px 0;">
                <span>စုစုပေါင်း:</span><span id="cart-total" style="color:var(--red);">0 Ks</span>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:5px;">
                <button class="btn btn-dark" onclick="showReceipt()"><i class="fas fa-file-invoice"></i> Preview</button>
                <button class="btn btn-green" onclick="processSale()"><i class="fas fa-check-circle"></i> သိမ်းမည်</button>
            </div>
        </div>
    </main>

    <main id="tab-stock" class="container">
        <div class="card" style="margin-bottom:5px;"><h3><i class="fas fa-box"></i> လက်ရှိလက်ကျန်စာရင်း</h3></div>
        <div class="table-area">
            <table>
                <thead><tr><th>ပစ္စည်းအမည်</th><th>ရောင်းဈေး</th><th>Stock</th></tr></thead>
                <tbody id="stock-body"></tbody>
            </table>
        </div>
    </main>

    <main id="tab-inv" class="container">
        <div class="card" style="margin-bottom:5px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3><i class="fas fa-warehouse"></i> ဂိုထောင်</h3>
                <button class="btn btn-dark" onclick="openAddModal()" style="width:auto; padding:5px 12px;">+ အသစ်</button>
            </div>
            <input type="text" id="inv-search" class="input-style" placeholder="ဂိုထောင်ထဲတွင် ရှာရန်..." onkeyup="refreshUI()" style="margin-top:8px;">
        </div>
        <div class="table-area">
            <table>
                <thead><tr><th>ပုံ</th><th>အမည်</th><th>ဝယ်</th><th>ရောင်း</th><th>Stock</th><th>Action</th></tr></thead>
                <tbody id="inv-body"></tbody>
            </table>
        </div>
    </main>

    <main id="tab-rep" class="container">
        <div class="card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <select id="rep-type" class="input-style" onchange="runReport()">
                    <option value="day">နေ့စဉ်</option>
                    <option value="month">လစဉ်</option>
                </select>
                <input type="date" id="rep-date" class="input-style" onchange="runReport()">
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div style="background:#f1f5f9; padding:10px; border-radius:10px; text-align:center;"><small>ရောင်းရငွေ</small><br><b id="sum-rev">0</b></div>
                <div style="background:#f0fdf4; padding:10px; border-radius:10px; text-align:center;"><small>အမြတ်</small><br><b id="sum-prof" style="color:var(--green);">0</b></div>
            </div>
        </div>
        <div class="table-area">
            <table>
                <thead><tr><th>ရက်စွဲ</th><th>Customer</th><th>စုစုပေါင်း</th><th>အမြတ်</th><th>Action</th></tr></thead>
                <tbody id="rep-body"></tbody>
            </table>
        </div>
    </main>

    <nav class="nav">
        <button class="nav-item active" id="n-sales" onclick="navTo('tab-sales', this)"><i class="fas fa-cash-register"></i>အရောင်း</button>
        <button class="nav-item" id="n-stock" onclick="navTo('tab-stock', this)"><i class="fas fa-clipboard-list"></i>လက်ကျန်</button>
        <button class="nav-item" id="n-inv" onclick="askPass('tab-inv', this)"><i class="fas fa-boxes"></i>ဂိုထောင်</button>
        <button class="nav-item" id="n-rep" onclick="askPass('tab-rep', this)"><i class="fas fa-file-invoice-dollar"></i>စာရင်း</button>
    </nav>

    <div id="login-overlay" class="overlay">
        <div class="modal-card">
            <h3>Admin Password</h3><br>
            <input type="password" id="pass-input" class="input-style" placeholder="Password...">
            <button class="btn btn-dark" onclick="checkPass()">ဝင်မည်</button>
            <button class="btn" onclick="closeOverlay('login-overlay')" style="margin-top:10px;">ပိတ်မည်</button>
        </div>
    </div>

    <div id="add-overlay" class="overlay">
        <div class="modal-card">
            <h3 id="modal-title">ပစ္စည်းအချက်အလက်</h3><br>
            <input type="hidden" id="edit-id">
            <select id="p-cat" class="input-style">
                <option value="အအေး">အအေး</option><option value="ကော်ဖီ">ကော်ဖီ</option><option value="ခေါက်ဆွဲ">ခေါက်ဆွဲ</option>
                <option value="လူသုံးကုန်">လူသုံးကုန်</option><option value="မီးဖိုချောင်သုံး">မီးဖိုချောင်သုံး</option><option value="အခြား">အခြား</option>
            </select>
            <input type="text" id="p-name" class="input-style" placeholder="ပစ္စည်းအမည်">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="number" id="p-buy" class="input-style" placeholder="ဝယ်ဈေး">
                <input type="number" id="p-sell" class="input-style" placeholder="ရောင်းဈေး">
            </div>
            <div id="st-total-area"><input type="number" id="p-qty" class="input-style" placeholder="လက်ရှိ Stock"></div>
            <div id="st-add-area" style="display:none; background:#f1f5f9; padding:10px; border-radius:10px; margin-bottom:10px;">
                <small>+ Stock အသစ်ပေါင်းထည့်ရန်</small>
                <input type="number" id="p-new-qty" class="input-style" value="0">
            </div>
            <input type="file" accept="image/*" class="input-style" onchange="handleImg(event)">
            <button class="btn btn-green" onclick="saveProduct()">သိမ်းမည်</button>
            <button id="del-btn" class="btn btn-red" style="margin-top:10px; display:none;" onclick="deleteProduct()">ဖျက်မည်</button>
            <button class="btn" onclick="closeOverlay('add-overlay')" style="margin-top:10px;">မလုပ်တော့ပါ</button>
        </div>
    </div>

    <div id="receipt-overlay" class="overlay">
        <div class="modal-card" style="text-align: center;">
            <img id="print-preview-img" src="">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn btn-dark" onclick="window.print()">Print</button>
                <button class="btn btn-red" onclick="closeOverlay('receipt-overlay')">ပိတ်မည်</button>
            </div>
        </div>
    </div>

    <script>
        const SUPA_URL = "https://iyhskfxxpemtpspohjve.supabase.co";
        const SUPA_KEY = "sb_publishable_pJ6ewySbcvru7PNQdY0RAQ_8DLnS3j8";
        const _sb = supabase.createClient(SUPA_URL, SUPA_KEY);

        let products = [], cart = [], isAdmin = false, curCat = "all", tempImg = "", nextTab = "";

        window.onload = () => {
            document.getElementById('rep-date').value = new Date().toISOString().split('T')[0];
            checkConnection();
            loadProducts();
            if(sessionStorage.getItem('TTK_ADMIN') === 'true') { isAdmin=true; document.getElementById('logout-btn').style.display='block'; }
        };

        async function checkConnection() {
            try {
                const { error } = await _sb.from('products').select('id', { count: 'exact', head: true });
                if(!error) { document.getElementById('status-dot').className = 'dot online'; document.getElementById('status-text').innerText = 'Online'; }
            } catch (e) { document.getElementById('status-text').innerText = 'Offline'; }
        }

        async function loadProducts() {
            const { data } = await _sb.from('products').select('*').order('name');
            if (data) { products = data; refreshUI(); }
        }

        function refreshUI() {
            const qS = document.getElementById('search-box').value.toLowerCase();
            const qI = document.getElementById('inv-search').value.toLowerCase();

            // Sales Grid
            const posFiltered = products.filter(p => (curCat === 'all' || p.category === curCat) && p.name.toLowerCase().includes(qS));
            document.getElementById('pos-grid').innerHTML = posFiltered.map(p => `
                <div class="p-card" onclick="addToCart(${p.id})">
                    <span class="stock-tag">Stock: ${p.qty}</span>
                    <img src="${p.img || 'https://via.placeholder.com/150'}">
                    <div style="padding:6px; font-size:11px;"><b>${p.name}</b><br><span style="color:var(--red)">${p.sell.toLocaleString()} Ks</span></div>
                </div>`).join('');

            // Stock Table
            document.getElementById('stock-body').innerHTML = products.map(p => `
                <tr><td>${p.name}</td><td>${p.sell.toLocaleString()}</td><td style="color:${p.qty<5?'red':'green'}; font-weight:bold;">${p.qty}</td></tr>
            `).join('');

            // Inventory Table
            const invFiltered = products.filter(p => p.name.toLowerCase().includes(qI));
            document.getElementById('inv-body').innerHTML = invFiltered.map(p => `
                <tr>
                    <td><img src="${p.img || 'https://via.placeholder.com/50'}" style="width:35px;height:35px;border-radius:4px;object-fit:cover;"></td>
                    <td><b>${p.name}</b></td><td>${p.buy.toLocaleString()}</td><td>${p.sell.toLocaleString()}</td><td>${p.qty}</td>
                    <td><button class="btn btn-dark" onclick="editProduct(${p.id})" style="padding:5px;"><i class="fas fa-edit"></i></button></td>
                </tr>`).join('');
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            if(p.qty <= 0) return alert("လက်ကျန်မရှိပါ");
            const ex = cart.find(x => x.id === id);
            if(ex) { if(ex.cQty < p.qty) ex.cQty++; else alert("လက်ကျန်မလောက်ပါ"); }
            else cart.push({...p, cQty: 1});
            renderCart();
        }

        function renderCart() {
            let total = 0;
            document.getElementById('cart-list').innerHTML = cart.map(i => {
                total += i.sell * i.cQty;
                return `
                <div class="cart-item">
                    <div style="flex:1;"><b>${i.name}</b><br>${i.cQty} x ${i.sell.toLocaleString()}</div>
                    <div style="display:flex; align-items:center; gap:5px;">
                        <button onclick="adjustQty(${i.id}, -1)" style="width:22px; height:22px;">-</button>
                        <b>${i.cQty}</b>
                        <button onclick="adjustQty(${i.id}, 1)" style="width:22px; height:22px;">+</button>
                    </div>
                    <div style="width:60px; text-align:right;">${(i.sell*i.cQty).toLocaleString()}</div>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = total.toLocaleString() + " Ks";
            const cl = document.getElementById('cart-list'); cl.scrollTop = cl.scrollHeight;
        }

        function adjustQty(id, d) {
            const it = cart.find(x => x.id === id);
            if(it) { 
                it.cQty += d; 
                if(it.cQty > products.find(x=>x.id===id).qty) { it.cQty--; alert("Stock မရှိပါ"); }
                if(it.cQty <= 0) cart = cart.filter(x => x.id !== id);
            }
            renderCart();
        }

        async function showReceipt() {
            if(!cart.length) return;
            const ra = document.getElementById('receipt-render-area');
            let total = 0, html = `<div style="text-align:center;"><b>ထွန်းတောက်ကြွယ်</b><br><small>ရောင်းဝယ်ရေး</small></div><div class="r-line"></div>`;
            html += `<div style="font-size:12px;">ရက်စွဲ: ${new Date().toLocaleString()}<br>ဝယ်သူ: ${document.getElementById('cust-name').value || 'Guest'}</div><div class="r-line"></div>`;
            cart.forEach(i => {
                let sub = i.sell * i.cQty; total += sub;
                html += `<div style="display:flex; justify-content:space-between; font-size:13px;"><span>${i.name}</span><span>${sub.toLocaleString()}</span></div><div style="font-size:11px;">${i.cQty} x ${i.sell.toLocaleString()}</div>`;
            });
            html += `<div class="r-line"></div><div style="display:flex; justify-content:space-between; font-weight:bold;"><span>Total:</span><span>${total.toLocaleString()} Ks</span></div>`;
            ra.innerHTML = `<div style="margin-bottom:30px;">${html}</div><div class="r-line"></div><div>${html}</div>`;
            const canvas = await html2canvas(ra, { scale: 2 });
            document.getElementById('print-preview-img').src = canvas.toDataURL("image/png");
            document.getElementById('receipt-overlay').style.display = 'flex';
        }

        async function processSale() {
            if(!cart.length) return;
            const date = new Date().toISOString().split('T')[0];
            const staff = document.getElementById('staff-name').value || "-";
            const cust = document.getElementById('cust-name').value || "Guest";
            let rev=0, prof=0, items=[];
            for(let i of cart) {
                rev += i.sell * i.cQty; prof += (i.sell - i.buy) * i.cQty;
                items.push({id: i.id, n: i.name, q: i.cQty, b: i.buy, s: i.sell});
                await _sb.from('products').update({qty: i.qty - i.cQty}).eq('id', i.id);
            }
            await _sb.from('sales').insert([{date, rev, prof, cust: `${cust} / ${staff}`, items}]);
            alert("အောင်မြင်ပါသည်"); cart = []; renderCart(); loadProducts();
        }

        async function saveProduct() {
            const id = document.getElementById('edit-id').value, name = document.getElementById('p-name').value;
            const cat = document.getElementById('p-cat').value, buy = parseInt(document.getElementById('p-buy').value || 0);
            const sell = parseInt(document.getElementById('p-sell').value || 0);
            if(!name) return;
            if(id) {
                const p = products.find(x => x.id == id);
                const nq = parseInt(document.getElementById('p-new-qty').value || 0), fq = p.qty + nq;
                const fb = (buy !== p.buy && nq > 0) ? Math.round(((p.qty * p.buy) + (nq * buy)) / fq) : buy;
                const obj = { name, category: cat, buy: fb, sell, qty: fq };
                if(tempImg) obj.img = tempImg;
                await _sb.from('products').update(obj).eq('id', id);
            } else {
                const q = parseInt(document.getElementById('p-qty').value || 0);
                await _sb.from('products').insert([{name, category: cat, buy, sell, qty: q, img: tempImg}]);
            }
            closeOverlay('add-overlay'); loadProducts();
        }

        function navTo(tid, btn) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tid).classList.add('active');
            btn.classList.add('active');
            // Tab ပြောင်းတိုင်း Stock စာရင်းတွေ ပြန် Render လုပ်ဖို့
            refreshUI();
            if(tid === 'tab-rep') runReport();
        }

        function askPass(tid, btn) {
            if(isAdmin) navTo(tid, btn);
            else { nextTab = tid; document.getElementById('login-overlay').style.display='flex'; }
        }

        function checkPass() {
            if(document.getElementById('pass-input').value === "111111") {
                isAdmin=true; sessionStorage.setItem('TTK_ADMIN', 'true');
                document.getElementById('login-overlay').style.display='none';
                document.getElementById('logout-btn').style.display='block';
                navTo(nextTab, document.getElementById('n-' + nextTab.split('-')[1]));
            } else alert("မှားယွင်းနေပါသည်");
        }

        function logout() { isAdmin=false; sessionStorage.removeItem('TTK_ADMIN'); location.reload(); }

        function editProduct(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('edit-id').value = p.id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-cat').value = p.category || 'အခြား';
            document.getElementById('p-buy').value = p.buy;
            document.getElementById('p-sell').value = p.sell;
            document.getElementById('p-qty').value = p.qty;
            document.getElementById('p-qty').disabled = true;
            document.getElementById('st-add-area').style.display = 'block';
            document.getElementById('del-btn').style.display = 'block';
            tempImg = p.img;
            document.getElementById('add-overlay').style.display = 'flex';
        }

        async function deleteProduct() { if(confirm("ဖျက်မှာလား?")) { await _sb.from('products').delete().eq('id', document.getElementById('edit-id').value); closeOverlay('add-overlay'); loadProducts(); } }

        async function runReport() {
            const dt = document.getElementById('rep-date').value, ty = document.getElementById('rep-type').value;
            let q = _sb.from('sales').select('*');
            if(ty==='day') q = q.eq('date', dt); else q = q.like('date', `${dt.slice(0,7)}%`);
            const { data } = await q;
            let r=0, p=0, h=``;
            (data||[]).forEach(s => {
                r += s.rev; p += s.prof;
                h += `<tr><td>${s.date}</td><td>${s.cust}</td><td>${s.rev.toLocaleString()}</td><td>${s.prof.toLocaleString()}</td><td><button onclick="delSale(${s.id})" style="color:red; background:none; border:none;"><i class="fas fa-trash"></i></button></td></tr>`;
            });
            document.getElementById('sum-rev').innerText = r.toLocaleString();
            document.getElementById('sum-prof').innerText = p.toLocaleString();
            document.getElementById('rep-body').innerHTML = h;
        }

        async function delSale(sid) {
            if(!confirm("ဖျက်မှာလား?")) return;
            const { data: sale } = await _sb.from('sales').select('*').eq('id', sid).single();
            for(let it of sale.items) {
                const p = products.find(x => x.id === it.id);
                if(p) await _sb.from('products').update({qty: p.qty + it.q}).eq('id', it.id);
            }
            await _sb.from('sales').delete().eq('id', sid); runReport(); loadProducts();
        }

        function handleImg(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 150; canvas.height = 150;
                    canvas.getContext('2d').drawImage(img, 0, 0, 150, 150);
                    tempImg = canvas.toDataURL('image/jpeg', 0.6);
                };
                img.src = ev.target.result;
            };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        }
        function setCategory(c, b) { curCat = c; document.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); refreshUI(); }
        function openAddModal() {
            document.getElementById('edit-id').value = ""; document.getElementById('p-name').value = ""; 
            document.getElementById('p-qty').disabled = false; document.getElementById('st-add-area').style.display = 'none';
            document.getElementById('del-btn').style.display = 'none'; document.getElementById('add-overlay').style.display = 'flex';
        }
        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
