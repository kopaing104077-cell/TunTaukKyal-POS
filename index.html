<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ထွန်းတောက်ကြွယ် POS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --midnight: #020617; --primary: #1e293b; --green: #10b981; --red: #ef4444; --gold: #fbbf24; --bg: #f1f5f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', 'Pyidaungsu', sans-serif; }
        
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        .header { background: var(--midnight); color: white; height: 60px; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 1001; }
        .logo-area { display: flex; align-items: center; gap: 8px; font-size: 1.4rem; font-weight: bold; }
        .db-status { background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #666; }
        .dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }

        /* Main Container */
        .main-content { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 230px; -webkit-overflow-scrolling: touch; }
        .container { display: none; width: 100%; max-width: 800px; margin: auto; }
        .container.active { display: block; }

        /* Inputs & Search */
        .top-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .input-style { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; outline: none; background: white; }
        .search-area { position: relative; margin-bottom: 15px; }
        .search-area i { position: absolute; left: 12px; top: 15px; color: #94a3b8; }
        .search-area input { padding-left: 35px; }

        /* Categories */
        .cat-scroll { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 15px; scrollbar-width: none; }
        .cat-scroll::-webkit-scrollbar { display: none; }
        .cat-btn { white-space: nowrap; padding: 10px 20px; border-radius: 25px; border: 1px solid #cbd5e1; background: white; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .cat-btn.active { background: var(--midnight); color: white; border-color: var(--midnight); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* Product Grid */
        .grid-area { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .p-card { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #e2e8f0; position: relative; display: flex; flex-direction: column; transition: 0.2s; }
        .p-card:active { transform: scale(0.97); }
        .img-box { width: 100%; height: 120px; background: #f8fafc; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .stock-tag { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; font-size: 10px; padding: 4px 8px; border-radius: 6px; backdrop-filter: blur(4px); }
        .p-info { padding: 12px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .p-name { font-weight: bold; font-size: 15px; margin-bottom: 5px; color: var(--primary); }
        .p-price { color: var(--red); font-weight: bold; font-size: 15px; }

        /* Fixed Cart Summary (Matches 1000009960.jpg) */
        .summary-card { position: fixed; bottom: 65px; left: 10px; right: 10px; background: white; border-radius: 20px; padding: 15px; border: 2px solid var(--midnight); box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; }
        .cart-items-preview { padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid #eee; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 14px; }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #ddd; background: white; font-weight: bold; cursor: pointer; }
        
        .total-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .total-label { font-size: 24px; font-weight: bold; }
        .total-value { font-size: 24px; font-weight: bold; color: var(--red); }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 12px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; }
        .btn-preview { background: var(--midnight); }
        .btn-save { background: var(--green); }

        /* Bottom Nav */
        .nav { background: white; height: 65px; display: flex; border-top: 1px solid #e2e8f0; position: fixed; bottom: 0; width: 100%; z-index: 1001; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; color: #94a3b8; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--midnight); font-weight: bold; border-top: 3px solid var(--midnight); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        /* Modals */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; padding: 15px; }
        .modal { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        #receipt-canvas { width: 100%; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 15px; }

        /* Tables for other tabs */
        .table-wrap { background: white; border-radius: 15px; border: 1px solid #e2e8f0; overflow: hidden; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 12px; text-align: left; font-size: 13px; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }

        #receipt-render { position: absolute; left: -9999px; width: 350px; background: white; color: black; padding: 20px; font-family: 'Pyidaungsu', sans-serif; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-area">
            <i class="fas fa-star" style="color:var(--gold)"></i>
            <span>ထွန်းတောက်ကြွယ်</span>
        </div>
        <div class="db-status">
            <div id="status-dot" class="dot"></div>
            <span id="status-text">Connecting...</span>
        </div>
    </header>

    <div id="receipt-render"></div>

    <main class="main-content">
        <div id="tab-sales" class="container active">
            <div class="top-inputs">
                <input type="text" id="cust-name" class="input-style" placeholder="ဝယ်သူအမည်">
                <input type="text" id="staff-name" class="input-style" placeholder="အရောင်းသမားအမည်">
            </div>
            <div class="search-area">
                <i class="fas fa-search"></i>
                <input type="text" id="search-box" class="input-style" placeholder="ပစ္စည်းအမည်ဖြင့် ရှာဖွေရန်..." onkeyup="refreshUI()">
            </div>

            <div class="cat-scroll" id="cat-list">
                <button class="cat-btn active" onclick="setCat('all', this)">အားလုံး</button>
                <button class="cat-btn" onclick="setCat('အအေး', this)">အအေး</button>
                <button class="cat-btn" onclick="setCat('ကော်ဖီ', this)">ကော်ဖီ</button>
                <button class="cat-btn" onclick="setCat('ခေါက်ဆွဲ', this)">ခေါက်ဆွဲ</button>
                <button class="cat-btn" onclick="setCat('လူသုံးကုန်', this)">လူသုံးကုန်</button>
            </div>

            <div id="pos-grid" class="grid-area"></div>
        </div>

        <div id="tab-stock" class="container">
            <div style="padding:10px; font-weight:bold;">လက်ရှိလက်ကျန်စာရင်း</div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>ပစ္စည်းအမည်</th><th>ရောင်းဈေး</th><th style="text-align:center;">Stock</th></tr></thead>
                    <tbody id="stock-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="summary-card" id="cart-summary" style="display:none;">
        <div id="cart-preview-list" class="cart-items-preview"></div>
        <div class="total-section">
            <div class="total-label">စုစုပေါင်း:</div>
            <div class="total-value" id="total-amt">0 Ks</div>
        </div>
        <div class="action-btns">
            <button class="btn btn-preview" onclick="showReceipt()"><i class="fas fa-file-invoice"></i> Preview</button>
            <button class="btn btn-save" onclick="processSale()"><i class="fas fa-check-circle"></i> သိမ်းမည်</button>
        </div>
    </div>

    <nav class="nav">
        <button class="nav-item active" onclick="navTo('tab-sales', this)"><i class="fas fa-cash-register"></i>အရောင်း</button>
        <button class="nav-item" onclick="navTo('tab-stock', this)"><i class="fas fa-clipboard-list"></i>လက်ကျန်</button>
        <button class="nav-item" onclick="alert('ဂိုထောင်အပိုင်းကို ပြင်ဆင်နေဆဲဖြစ်သည်')"><i class="fas fa-boxes"></i>ဂိုထောင်</button>
        <button class="nav-item" onclick="alert('စာရင်းအပိုင်းကို ပြင်ဆင်နေဆဲဖြစ်သည်')"><i class="fas fa-file-invoice-dollar"></i>စာရင်း</button>
    </nav>

    <div id="preview-overlay" class="overlay">
        <div class="modal">
            <h3 style="margin-bottom:15px;">ဘောင်ချာနမူနာ</h3>
            <img id="receipt-canvas" src="">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn btn-preview" onclick="window.print()">Print</button>
                <button class="btn btn-save" style="background:var(--red);" onclick="document.getElementById('preview-overlay').style.display='none'">ပိတ်မည်</button>
            </div>
        </div>
    </div>

    <script>
        const SUPA_URL = "https://iyhskfxxpemtpspohjve.supabase.co";
        const SUPA_KEY = "sb_publishable_pJ6ewySbcvru7PNQdY0RAQ_8DLnS3j8";
        const _sb = supabase.createClient(SUPA_URL, SUPA_KEY);

        let products = [], cart = [], curCat = 'all';

        window.onload = () => { loadProducts(); checkCon(); };

        async function checkCon() {
            try {
                const { error } = await _sb.from('products').select('id', { count: 'exact', head: true });
                if(!error) { 
                    document.getElementById('status-dot').className = 'dot online'; 
                    document.getElementById('status-text').innerText = 'Online'; 
                }
            } catch (e) { document.getElementById('status-text').innerText = 'Offline'; }
        }

        async function loadProducts() {
            const { data } = await _sb.from('products').select('*').order('name');
            if(data) { products = data; refreshUI(); }
        }

        function refreshUI() {
            const q = document.getElementById('search-box').value.toLowerCase();
            const filtered = products.filter(p => (curCat==='all' || p.category===curCat) && p.name.toLowerCase().includes(q));

            // Render POS Grid
            document.getElementById('pos-grid').innerHTML = filtered.map(p => `
                <div class="p-card" onclick="addToCart(${p.id})">
                    <div class="img-box">
                        <span class="stock-tag">Stock: ${p.qty}</span>
                        <img src="${p.img || 'https://placehold.co/150?text=No+Image'}" onerror="this.src='https://placehold.co/150?text=No+Image'">
                    </div>
                    <div class="p-info">
                        <div class="p-name">${p.name}</div>
                        <div class="p-price">${p.sell.toLocaleString()} Ks</div>
                    </div>
                </div>`).join('');

            // Render Stock List
            document.getElementById('stock-body').innerHTML = products.map(p => `
                <tr>
                    <td><b>${p.name}</b></td>
                    <td>${p.sell.toLocaleString()} Ks</td>
                    <td style="text-align:center; color:${p.qty<5?'red':'green'}; font-weight:bold;">${p.qty}</td>
                </tr>`).join('');
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            if(p.qty <= 0) return alert("လက်ကျန်မရှိတော့ပါ");
            const ex = cart.find(x => x.id === id);
            if(ex) { 
                if(ex.cQty < p.qty) ex.cQty++; 
                else return alert("လက်ကျန်ထက် ပိုရောင်း၍မရပါ");
            } else { cart.push({...p, cQty: 1}); }
            renderCart();
        }

        function renderCart() {
            const summary = document.getElementById('cart-summary');
            if(cart.length === 0) { summary.style.display = 'none'; return; }
            summary.style.display = 'block';

            let total = 0;
            document.getElementById('cart-preview-list').innerHTML = cart.map(i => {
                total += i.sell * i.cQty;
                return `
                <div class="cart-row">
                    <div style="flex:1;"><b>${i.name}</b><br><small>${i.sell.toLocaleString()} Ks</small></div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty(${i.id}, -1)">-</button>
                        <b>${i.cQty}</b>
                        <button class="qty-btn" onclick="updateQty(${i.id}, 1)">+</button>
                        <i class="fas fa-trash" style="color:var(--red); margin-left:10px;" onclick="removeFromCart(${i.id})"></i>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('total-amt').innerText = total.toLocaleString() + " Ks";
        }

        function updateQty(id, d) {
            const it = cart.find(x => x.id === id);
            if(it) {
                it.cQty += d;
                if(it.cQty <= 0) removeFromCart(id);
                else {
                    const p = products.find(x => x.id === id);
                    if(it.cQty > p.qty) { it.cQty--; alert("Stock မလောက်ပါ"); }
                }
            }
            renderCart();
        }

        function removeFromCart(id) { cart = cart.filter(x => x.id !== id); renderCart(); }

        async function showReceipt() {
            if(!cart.length) return;
            const renderArea = document.getElementById('receipt-render');
            renderArea.innerHTML = ""; // FIX: Clear before rendering to avoid double receipt

            let total = 0;
            let html = `
                <div style="text-align:center; margin-bottom:15px;">
                    <h2 style="margin:0;">ထွန်းတောက်ကြွယ်</h2>
                    <p style="font-size:12px; margin:5px 0;">Retail & Wholesale</p>
                    <div style="border-top:1px dashed #000; margin:10px 0;"></div>
                </div>
                <div style="font-size:12px; margin-bottom:10px;">
                    ရက်စွဲ: ${new Date().toLocaleString()}<br>
                    ဝယ်သူ: ${document.getElementById('cust-name').value || 'Guest'}
                </div>
                <div style="border-top:1px dashed #000; margin:10px 0;"></div>
                <table style="width:100%; font-size:13px; border-collapse:collapse;">
            `;

            cart.forEach(i => {
                let sub = i.sell * i.cQty;
                total += sub;
                html += `
                    <tr>
                        <td style="padding:5px 0;">${i.name}<br><small>1 x ${i.sell.toLocaleString()}</small></td>
                        <td style="text-align:right;">${sub.toLocaleString()}</td>
                    </tr>
                `;
            });

            html += `
                </table>
                <div style="border-top:1px dashed #000; margin:10px 0;"></div>
                <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:16px;">
                    <span>Total:</span>
                    <span>${total.toLocaleString()} Ks</span>
                </div>
                <div style="text-align:center; margin-top:20px; font-size:12px;">ဝယ်ယူအားပေးမှုကို ကျေးဇူးတင်ပါသည်</div>
            `;

            renderArea.innerHTML = html;
            const canvas = await html2canvas(renderArea, { scale: 2 });
            document.getElementById('receipt-canvas').src = canvas.toDataURL();
            document.getElementById('preview-overlay').style.display = 'flex';
        }

        async function processSale() {
            if(!cart.length) return;
            if(!confirm("အရောင်းစာရင်း သိမ်းဆည်းမလား?")) return;
            try {
                const date = new Date().toISOString().split('T')[0];
                const cust = document.getElementById('cust-name').value || "Guest";
                const staff = document.getElementById('staff-name').value || "-";
                
                for(let it of cart) {
                    const p = products.find(x => x.id === it.id);
                    await _sb.from('products').update({ qty: p.qty - it.cQty }).eq('id', it.id);
                }
                
                let rev = cart.reduce((s, i) => s + (i.sell * i.cQty), 0);
                let prof = cart.reduce((s, i) => s + ((i.sell - i.buy) * i.cQty), 0);
                
                await _sb.from('sales').insert([{ date, rev, prof, cust: `${cust} (${staff})`, items: cart }]);
                
                alert("အရောင်းသိမ်းဆည်းပြီးပါပြီ");
                cart = []; renderCart(); loadProducts();
            } catch (e) { alert("Error: " + e.message); }
        }

        function navTo(tid, btn) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tid).classList.add('active');
            btn.classList.add('active');
            // Hide/Show cart summary based on tab
            document.getElementById('cart-summary').style.visibility = (tid === 'tab-sales' && cart.length > 0) ? 'visible' : 'hidden';
        }

        function setCat(c, b) {
            curCat = c;
            document.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            refreshUI();
        }
    </script>
</body>
</html>
